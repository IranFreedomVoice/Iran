<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freedom Voice Iran</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      background: #d9f6f7;
      color: #111;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .top-flag {
      width: 100%;
      line-height: 0;
    }

    .top-flag img {
      width: 100%;
      height: auto;
      display: block;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 24px 60px;
    }

    .image-card {
      width: 100%;
      max-width: 760px;
      margin: 0 auto 35px;
      border: 3px solid #6d6d6d;
      border-radius: 26px;
      overflow: hidden;
      background: transparent;
    }

    .main-image {
      width: 100%;
      display: block;
      height: auto;
    }

    .main-title {
      margin: 10px 0 14px;
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #000;
    }

    .desc {
      margin: 0 0 34px;
      font-size: 28px;
      color: #333;
    }

    .buttons-area {
      max-width: 760px;
      margin: 0 auto;
    }

    .lang-btn {
      display: block;
      width: 100%;
      margin: 22px 0;
      padding: 22px 20px;
      border-radius: 22px;
      border: 2px solid #888;
      background: linear-gradient(to right, #198f52 0%, #ffffff 50%, #ef1c1c 100%);
      color: #111;
      font-size: 32px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    footer {
      margin-top: 60px;
      padding-top: 30px;
      border-top: 2px solid #555;
    }

    .footer-title {
      font-size: 24px;
      color: #000;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .contact-btn {
      display: inline-block;
      padding: 16px 34px;
      border-radius: 16px;
      border: 2px solid #777;
      background: #fff;
      color: #000;
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    @media (max-width: 900px) {
      .container {
        padding: 24px 20px 50px;
      }

      .main-title {
        font-size: 54px;
      }

      .desc {
        font-size: 22px;
      }

      .lang-btn {
        font-size: 26px;
        padding: 20px 18px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 18px 16px 45px;
      }

      .image-card {
        border-radius: 20px;
      }

      .main-title {
        font-size: 42px;
        letter-spacing: 2px;
      }

      .desc {
        font-size: 18px;
        margin-bottom: 24px;
      }

      .lang-btn {
        font-size: 22px;
        padding: 18px 14px;
        border-radius: 18px;
        margin: 18px 0;
      }

      .footer-title {
        font-size: 20px;
      }

      .contact-btn {
        font-size: 18px;
        padding: 14px 26px;
      }
    }
  </style>
</head>
<body>

  <div class="top-flag">
    <img src="c8811ebc-cd46-4b76-ac28-5fd641b23e2e.jpeg" alt="Flag" />
  </div>

  <div class="container">
    <div class="image-card">
      <img src="IMG_4383.jpeg" alt="Shir-o-khorshid Revolution" class="main-image" />
    </div>

    <h1 class="main-title">IRAN</h1>
    <p class="desc">Iranian Shir-o-khorshid Revolution 2026</p>

    <div class="buttons-area">
      <a class="lang-btn" href="english.html">English</a>
      <a class="lang-btn" href="deutsch.html">Deutsch</a>
      <a class="lang-btn" href="farsi.html">فارسی</a>
    </div>

    <footer>
      <div class="footer-title">Long Iive Iran </div>
      <a class="contact-btn" href="contact.html">Contact</a>
    </footer>
  </div>

</body>
</html>
