<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iran</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .flag-top {
      width: 100%;
      height: 240px;
      overflow: hidden;
      border-bottom: 2px solid #444;
    }

    .flag-top img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .main {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
      padding: 30px 20px 50px;
    }

    .left {
      flex: 1 1 320px;
      display: flex;
      justify-content: flex-start;
      align-items: flex-end;
    }

    .left img {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      border: 2px solid #666;
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
    }

    .right {
      flex: 1 1 320px;
      text-align: center;
    }

    .title {
      font-size: 64px;
      margin: 0 0 20px;
      letter-spacing: 4px;
    }

    .subtitle {
      font-size: 24px;
      color: #ddd;
      margin-bottom: 35px;
      line-height: 1.8;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 340px;
      margin: 0 auto;
    }

    .buttons a {
      text-decoration: none;
      background: linear-gradient(to right, #138808, #ffffff, #da1212);
      color: #111;
      font-weight: bold;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 20px;
      border: 1px solid #999;
    }

    footer {
      text-align: center;
      padding: 16px;
      color: #aaa;
      border-top: 1px solid #222;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .flag-top {
        height: 170px;
      }

      .title {
        font-size: 42px;
      }

      .subtitle {
        font-size: 18px;
      }

      .left {
        justify-content: center;
      }

      .main {
        padding: 20px 15px 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="flag-top">
      <img src="c8811ebc-cd46-4b76-ac28-5fd641b23e2e.jpeg" alt="Iran Flag">
    </div>

    <div class="main">
      <div class="left">
        <img src="IMG_4383.jpeg" alt="Prince Reza Pahlavi">
      </div>

      <div class="right">
        <h1 class="title">IRAN</h1>
        <div class="subtitle">
          Revolution without Islam<br>
          Iran 2026
        </div>

        <div class="buttons">
          <a href="english.html">English</a>
          <a href="deutsch.html">Deutsch</a>
          <a href="farsi.html">فارسی</a>
        </div>
      </div>
    </div>

    <footer>
      Freedom • Voice • Iran
    </footer>
  </div>
</body>
</html>
