<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freedom Voice Iran</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
      background: #d9f6f7;
      color: #111;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .top-flag {
      width: 100%;
      margin: 0;
      padding: 0;
      line-height: 0;
    }

    .top-flag img {
      width: 100%;
      height: auto;
      display: block;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 18px 18px 50px;
    }

    .image-card {
      width: 100%;
      max-width: 780px;
      margin: 10px auto 30px;
      border: 3px solid #6d6d6d;
      border-radius: 26px;
      overflow: hidden;
      background: transparent;
    }

    .main-image {
      width: 100%;
      height: auto;
      display: block;
    }

    .main-title {
      margin: 20px 0 12px;
      font-size: 4rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #000;
    }

    .desc {
      margin: 0 0 28px;
      font-size: 1.2rem;
      color: #333;
    }

    .lang-btn {
      display: block;
      width: 88%;
      max-width: 680px;
      margin: 26px auto;
      padding: 22px 20px;
      border-radius: 22px;
      border: 2px solid #888;
      background: linear-gradient(to right, #0b6b3a 0%, #ffffff 50%, #ef1c1c 100%);
      color: #111;
      font-size: 2rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .contact-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 18px 34px;
      border-radius: 18px;
      border: 2px solid #777;
      background: #ffffff;
      color: #000;
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
    }

    footer {
      margin-top: 60px;
      padding: 36px 20px 50px;
      border-top: 2px solid #555;
    }

    .footer-title {
      font-size: 1.25rem;
      color: #000;
      margin-bottom: 24px;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .main-title {
        font-size: 3rem;
      }

      .lang-btn {
        font-size: 1.8rem;
        padding: 20px 16px;
      }
    }

    @media (max-width: 480px) {
      .main-title {
        font-size: 2.8rem;
      }

      .desc {
        font-size: 1rem;
      }

      .lang-btn {
        width: 92%;
        font-size: 1.45rem;
        padding: 18px 12px;
        border-radius: 18px;
      }

      .contact-btn {
        font-size: 1.05rem;
        padding: 16px 28px;
      }
    }
  </style>
</head>
<body>

  <div class="top-flag">
    <img src="c8811ebc-cd46-4b76-ac28-5fd641b23e2e.jpeg" alt="Flag" />
  </div>

  <div class="container">

    <div class="image-card">
      <img src="IMG_4383.jpeg" alt="Shir-o-khorshid Revolution" class="main-image" />
    </div>

    <h1 class="main-title">IRAN</h1>
    <p class="desc">Iranian Shir-o-khorshid Revolution 2026</p>

    <a class="lang-btn" href="english.html">English</a>
    <a class="lang-btn" href="deutsch.html">Deutsch</a>
    <a class="lang-btn" href="farsi.html">فارسی</a>

    <footer>
      <div class="footer-title">Shir-o-khorshid Revolution</div>
      <a class="contact-btn" href="contact.html">Contact</a>
    </footer>

  </div>

</body>
</html>
