<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اقدامات فوری</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: #d8eef0;
      text-align: center;
    }

    .card {
      width: 85%;
      max-width: 700px;
      margin: 40px auto;
      background: #f4f4f4;
      border: 4px solid #999;
      border-radius: 35px;
      padding: 40px 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 30px;
      color: black;
    }

    p {
      font-size: 18px;
      margin-bottom: 35px;
      color: black;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
    }

    .button {
      display: inline-block;
      min-width: 140px;
      padding: 14px 24px;
      background: white;
      border: 3px solid #999;
      border-radius: 22px;
      text-decoration: none;
      color: black;
      font-size: 20px;
      font-weight: bold;
    }

    .button:hover {
      background: #ececec;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>اقدامات فوری</h1>
    <p>برای دیدن پست، روی دکمه زیر بزنید.</p>

    <div class="buttons">
      <a href="Farsi.html" class="button">برگشت</a>
      <a href="#" class="button">حمایت</a>
      <a href="#" class="button">ریپورت</a>
      <a href="#" class="button">پتیشن</a>
    </div>
  </div>

</body>
</html>
