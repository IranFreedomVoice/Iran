<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فارسی - Freedom Voice Iran</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #d9f6f7;
      font-family: Tahoma, Arial, sans-serif;
      color: #111;
    }

    .top-flag {
      width: 100%;
      line-height: 0;
    }

    .top-flag img {
      width: 100%;
      height: auto;
      display: block;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    .page-mark {
      text-align: right;
      font-size: 15px;
      font-weight: 700;
      color: #222;
      margin-bottom: 22px;
    }

    .buttons-wrap {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
      margin-right: auto;
      margin-left: 0;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 13px 18px;
      border-radius: 28px;
      border: 2px solid #888;
      background: linear-gradient(to left, #19b543 0%, #ffffff 50%, #ef1c1c 100%);
      color: #111;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      text-align: right;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .section-box {
      width: 100%;
      max-width: 700px;
      margin-top: 28px;
      background: #eef9fa;
      border: 2px solid #b7cfd1;
      border-radius: 24px;
      padding: 20px 16px 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .section-title {
      text-align: right;
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 16px;
    }

    .sub-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sub-button {
      display: block;
      width: 100%;
      padding: 12px 16px;
      border-radius: 22px;
      border: 2px solid #9a9a9a;
      background: #ffffff;
      color: #111;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      text-align: right;
      box-shadow: 0 3px 8px rgba(0,0,0,0.10);
    }

    .back-btn {
      display: inline-block;
      margin-top: 26px;
      padding: 11px 22px;
      border-radius: 14px;
      background: #fff;
      border: 2px solid #888;
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px 16px 50px;
      }

      .buttons-wrap,
      .section-box {
        max-width: 100%;
      }

      .menu-button {
        font-size: 16px;
        padding: 12px 14px;
      }

      .sub-button {
        font-size: 16px;
        padding: 11px 14px;
      }

      .section-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

      <a class="menu-button" href="#urgent-actions">۴. اقدامات فوری</a>
    </div>
