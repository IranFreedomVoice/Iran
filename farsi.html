<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فارسی - Freedom Voice Iran</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #d9f6f7;
      font-family: Tahoma, Arial, sans-serif;
      color: #111;
    }

    .top-flag {
      width: 100%;
      line-height: 0;
      position: relative;
    }

    .top-flag img {
      width: 100%;
      height: auto;
      display: block;
    }

    .top-bar-inside-flag {
      position: absolute;
      top: 12px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .site-title {
      display: inline-block;
      padding: 8px 14px;
      background: rgba(0,0,0,0.35);
      color: #fff;
      border-radius: 14px;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      text-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .lang-wrap {
      position: relative;
      direction: ltr;
    }

    .lang-btn {
      border: 1px solid rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.95);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #111;
    }

    .lang-menu {
      display: none;
      position: absolute;
      top: 46px;
      left: 0;
      width: 150px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      overflow: hidden;
      z-index: 20;
    }

    .lang-menu.open {
      display: block;
    }

    .lang-menu a {
      display: block;
      padding: 10px 12px;
      text-decoration: none;
      color: #111;
      font-size: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    .lang-menu a:last-child {
      border-bottom: none;
    }

    .nav-strip {
      width: 100%;
      background: #f7f7f7;
      border-bottom: 1px solid #ddd;
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .nav-inner::-webkit-scrollbar {
      display: none;
    }

    .nav-inner a {
      text-decoration: none;
      color: #222;
      font-size: 18px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .nav-inner a.highlight {
      background: #f3a9a9;
      color: #4b1d1d;
      padding: 8px 16px;
      border-radius: 999px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    .hero-box {
      background: #fff;
      border: 2px solid #999;
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 28px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .hero-box img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 18px;
    }

    .section-title {
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      margin: 8px 0 24px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .video-card {
      background: #fff;
      border: 2px solid #999;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    }

    .video-card video {
      width: 100%;
      display: block;
      background: #000;
    }

    .video-text {
      padding: 14px;
      font-size: 19px;
      font-weight: 700;
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .site-title {
        font-size: 20px;
      }

      .nav-inner a {
        font-size: 16px;
      }

      .section-title {
        font-size: 30px;
      }
    }
