<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فارسی</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background-color: #dbeff0;
      color: #111;
      text-align: center;
    }

    .top-flag {
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      line-height: 0;
    }

    .top-flag img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px 12px 40px;
    }

    h1 {
      font-size: 1.9rem;
      margin: 10px 0 24px;
      text-align: right;
    }

    .buttons-wrap {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .menu-button {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 94%;
      max-width: 760px;
      min-height: 48px;
      padding: 10px 22px;
      text-decoration: none;
      color: #111;
      font-size: 0.95rem;
      font-weight: bold;
      text-align: right;
      border-radius: 999px;
      border: 2px solid #8f8f8f;
      background: linear-gradient(to left, #ff2f2f 0%, #f3bcbc 33%, #e8e8e8 50%, #9bdb9b 72%, #37cf37 100%);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
    }

    .menu-button span {
      width: 100%;
      display: block;
    }

    .back-wrap {
      text-align: left;
      direction: ltr;
      margin-top: 28px;
    }

    .back-btn {
      display: inline-block;
      padding: 10px 22px;
      background: #f4f4f4;
      color: #111;
      text-decoration: none;
      border: 2px solid #8d8d8d;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .top-flag img {
        height: 140px;
      }

      h1 {
        font-size: 1.6rem;
      }

      .menu-button {
        min-height: 44px;
        font-size: 0.9rem;
        padding: 9px 18px;
      }
    }
  </style>
</head>
<body>

  <div class="top-flag">
    <img src="IMG_4383.jpeg" alt="پرچم شیر و خورشید">
  </div>

  <div class="container">
    <h1>فارسی</h1>

    <div class="buttons-wrap">
      <a class="menu-button" href="history-fa.html">
        <span>۱. تاریخ</span>
      </a>

      <a class="menu-button" href="martyrs-fa.html">
        <span>۲. جاویدنامان</span>
      </a>

      <a class="menu-button" href="https://www.rezapahlavi.org/fa" target="_blank" rel="noopener noreferrer">
        <span>۳. برنامه گذار شاهزاده رضا پهلوی</span>
      </a>

      <a class="menu-button" href="urgent-fa.html">
        <span>۴. اقدامات فوری</span>
      </a>
    </div>

    <div class="back-wrap">
      <a class="back-btn" href="index.html">Back</a>
    </div>
  </div>

</body>
</html>
