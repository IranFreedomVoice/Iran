<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فارسی</title>

  <style>
    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background-color: #dbeff0;
      color: #111;
      text-align: center;
    }

    .top-flag {
      width: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      line-height: 0;
    }

    .top-flag img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 300px;
      object-fit: cover;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 18px 50px;
    }

    h1 {
      font-size: 2rem;
      margin: 18px 0 28px;
      color: #111;
      text-align: right;
    }

    .buttons-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      margin-top: 10px;
    }

    .menu-button {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 92%;
      max-width: 760px;
      min-height: 64px;
      padding: 14px 26px;
      text-decoration: none;
      color: #111;
      font-size: 1.05rem;
      font-weight: bold;
      border-radius: 999px;
      border: 2px solid #8f8f8f;
      background: linear-gradient(to left, #ff2f2f 0%, #f3bcbc 33%, #e8e8e8 50%, #9bdb9b 72%, #37cf37 100%);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-align: right;
    }

    .menu-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.22);
    }

    .menu-button span {
      width: 100%;
      display: block;
    }

    .back-wrap {
      text-align: left;
      margin-top: 34px;
      direction: ltr;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #f4f4f4;
      color: #111;
      text-decoration: none;
      border: 2px solid #8d8d8d;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: bold;
    }

    .back-btn:hover {
      background: #e9e9e9;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 1.6rem;
        margin: 16px 0 22px;
      }

      .menu-button {
        width: 95%;
        min-height: 58px;
        padding: 12px 20px;
        font-size: 0.98rem;
      }

      .top-flag img {
        max-height: 220px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 16px 12px 40px;
      }

      h1 {
        font-size: 1.45rem;
      }

      .menu-button {
        font-size: 0.92rem;
        min-height: 54px;
        padding: 10px 16px;
      }

      .back-btn {
        padding: 10px 20px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <div class="top-flag">
    <img src="IMG_4383.jpeg" alt="پرچم شیر و خورشید" />
  </div>

  <div class="container">
    <h1>فارسی</h1>

    <div class="buttons-wrap">
      <a class="menu-button" href="history-fa.html">
        <span>۱. تاریخ</span>
      </a>

      <a class="menu-button" href="martyrs-fa.html">
        <span>۲. جاویدنامان</span>
      </a>

      <a class="menu-button" href="https://www.rezapahlavi.org/fa" target="_blank" rel="noopener noreferrer">
        <span>۳. برنامه گذار شاهزاده رضا پهلوی</span>
      </a>

      <a class="menu-button" href="urgent-fa.html">
        <span>۴. اقدامات فوری</span>
      </a>
    </div>

    <div class="back-wrap">
      <a class="back-btn" href="index.html">Back</a>
    </div>
  </div>

</body>
</html>
