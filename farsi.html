  <title>فارسی - Freedom Voice Iran</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #d9f6f7;
      font-family: Arial, sans-serif;
      color: #111;
    }

    .top-flag {
      width: 100%;
      line-height: 0;
    }

    .top-flag img {
      width: 100%;
      height: auto;
      display: block;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 26px 24px 60px;
    }

    .page-mark {
      text-align: left;
      font-size: 15px;
      font-weight: 700;
      color: #222;
      margin-bottom: 22px;
    }

    .buttons-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
    }

    .menu-button {
      display: block;
      width: 100%;
      padding: 13px 16px;
      border-radius: 16px;
      border: 2px solid #888;
      background: linear-gradient(to right, #19b543 0%, #ffffff 50%, #ef1c1c 100%);
      color: #111;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      text-align: right;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .back-btn {
      display: inline-block;
      margin-top: 26px;
      padding: 11px 22px;
      border-radius: 14px;
      background: #fff;
      border: 2px solid #888;
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px 16px 50px;
      }

      .page-mark {
        font-size: 14px;
      }

      .buttons-wrap {
        max-width: 300px;
      }

      .menu-button {
        font-size: 15px;
        padding: 12px 14px;
      }

      .back-btn {
        font-size: 15px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
