<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Freedom Voice Iran</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #d9f6f7;
      font-family: Arial, sans-serif;
      text-align: center;
      color: #111;
    }

    .top-flag {
      width: 100%;
      margin: 0;
      padding: 0;
      line-height: 0;
    }

    .top-flag img {
      width: 100%;
      height: auto;
      display: block;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 18px 60px;
    }

    h1 {
      margin: 10px 0 18px;
      font-size: 3rem;
      color: #000;
    }

    .subtitle {
      font-size: 1.15rem;
      color: #333;
      margin-bottom: 34px;
    }

    .contact-button {
      display: block;
      width: 88%;
      max-width: 680px;
      margin: 24px auto;
      padding: 22px 20px;
      border-radius: 22px;
      border: 2px solid #888;
      background: linear-gradient(to right, #0b6b3a 0%, #ffffff 50%, #ef1c1c 100%);
      color: #111;
      font-size: 2rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .back-btn {
      display: inline-block;
      margin-top: 26px;
      padding: 14px 28px;
      border-radius: 16px;
      background: #fff;
      border: 2px solid #888;
      color: #000;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.4rem;
      }

      .contact-button {
        font-size: 1.7rem;
        padding: 20px 16px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      .subtitle {
        font-size: 1rem;
      }

      .contact-button {
        width: 92%;
        font-size: 1.4rem;
        padding: 18px 12px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="top-flag">
    <img src="c8811ebc-cd46-4b76-ac28-5fd641b23e2e.jpeg" alt="Flag" />
  </div>

  <div class="container">
    <h1>Contact</h1>
    <p class="subtitle">Shir-o-khorshid Revolution</p>

    <a class="contact-button" href="mailto:freedom.voice.for.iran@gmail.com?subject=Contact">E-mail</a>

    <a class="contact-button" href="https://www.instagram.com/shirokhorshid_revolution?igsh=aW5kbm0za2cwYzNj" target="_blank">
      Instagram
    </a>

    <a class="contact-button" href="#" target="_blank">
      X
    </a>

    <a class="back-btn" href="index.html">Back</a>
  </div>

</body>
</html>
